<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 스캐너</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex justify-center min-h-screen font-sans">

    <div class="w-full max-w-md bg-gray-800 shadow-xl flex flex-col min-h-screen">
        
        <header class="bg-gray-950 p-4 text-center border-b border-gray-700 sticky top-0 z-10">
            <h1 class="text-xl font-bold text-blue-400">프리미엄 스캐너 ⚡</h1>
            <p id="update-time" class="text-xs text-gray-400 mt-1">거래량 TOP 20 실시간 스캔 중...</p>
        </header>

        <div class="grid grid-cols-4 gap-1 px-1 py-3 bg-gray-700 text-xs text-gray-300 font-semibold text-center border-b border-gray-600 sticky top-[72px] z-10 shadow-md">
            <div>코인명</div>
            <div>업비트(KRW)</div>
            <div class="text-white font-bold">차액(Gap)</div>
            <div>빗썸(KRW)</div>
        </div>

        <div id="coin-list" class="divide-y divide-gray-700 bg-gray-800 pb-2 flex-grow">
            <div class="p-6 text-center text-sm text-gray-400">
                실시간 거래량 데이터를 분석하고 있습니다...
            </div>
        </div>

        <div class="p-4 bg-gray-900 border-t border-gray-800 sticky bottom-0 z-10">
            <a href="https://blog.naver.com/" target="_blank" class="block w-full text-center bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg text-sm transition-colors shadow-lg">
                상한가 사냥꾼 헤리 블로그 바로가기
            </a>
        </div>

    </div>

    <script>
        let cachedUpbitCoins = []; // 업비트에 상장된 코인 목록 캐싱

        async function fetchMarketData() {
            try {
                // 1. 업비트 KRW 마켓 코인 목록 가져오기 (앱 켤 때 최초 1회만 실행)
                if (cachedUpbitCoins.length === 0) {
                    const upbitMarketsRes = await fetch('https://api.upbit.com/v1/market/all');
                    const upbitMarkets = await upbitMarketsRes.json();
                    cachedUpbitCoins = upbitMarkets.filter(m => m.market.startsWith('KRW-')).map(m => m.market.split('-')[1]);
                }

                // 2. 빗썸 전체 코인 시세 및 24시간 거래금액 가져오기
                const bithumbRes = await fetch('https://api.bithumb.com/public/ticker/ALL_KRW');
                const bithumbData = await bithumbRes.json();
                
                if(bithumbData.status !== "0000") return;

                let activeCoins = [];
                // 3. 업비트와 빗썸 양쪽에 모두 있는 코인만 걸러내기
                for (const coin in bithumbData.data) {
                    if (coin !== 'date' && cachedUpbitCoins.includes(coin)) {
                        activeCoins.push({
                            coin: coin,
                            bithumbPrice: parseFloat(bithumbData.data[coin].closing_price),
                            volume: parseFloat(bithumbData.data[coin].acc_trade_value_24h) // 거래대금
                        });
                    }
                }

                // 4. 거래대금(Volume) 기준 내림차순 정렬 후 상위 20개 추출
                activeCoins.sort((a, b) => b.volume - a.volume);
                const top20Coins = activeCoins.slice(0, 20);

                // 5. 상위 20개 코인의 업비트 실시간 시세 가져오기
                const upbitQuery = top20Coins.map(c => `KRW-${c.coin}`).join(',');
                const upbitRes = await fetch(`https://api.upbit.com/v1/ticker?markets=${upbitQuery}`);
                const upbitData = await upbitRes.json();

                const upbitPrices = {};
                upbitData.forEach(item => {
                    const coinSymbol = item.market.split('-')[1];
                    upbitPrices[coinSymbol] = item.trade_price;
                });

                // 6. 차액 계산
                let analysisResults = [];
                top20Coins.forEach(item => {
                    const uPrice = upbitPrices[item.coin];
                    const bPrice = item.bithumbPrice;
                    
                    if(uPrice && bPrice) {
                        const diff = uPrice - bPrice; // 업비트가 비싸면 양수, 빗썸이 비싸면 음수
                        analysisResults.push({
                            coin: item.coin,
                            upbit: uPrice,
                            bithumb: bPrice,
                            diff: diff,
                            absGap: Math.abs(diff) // 정렬을 위한 절대값
                        });
                    }
                });

                // 7. 차액의 '절대값'이 가장 큰 순서대로 내림차순 정렬 (차익 기회가 큰 것을 위로)
                analysisResults.sort((a, b) => b.absGap - a.absGap);

                // 8. 화면에 그리기
                const listContainer = document.getElementById('coin-list');
                listContainer.innerHTML = ''; 
                
                analysisResults.forEach(data => {
                    const fmtUpbit = data.upbit.toLocaleString();
                    const fmtBithumb = data.bithumb.toLocaleString();
                    const fmtDiff = Math.abs(data.diff).toLocaleString(); 
                    
                    // 양수/음수에 따른 색상 및 기호 로직
                    let diffColorClass = "text-gray-400";
                    let sign = "";
                    if (data.diff > 0) {
                        diffColorClass = "text-red-400"; // 업비트가 비싸면 빨간색
                        sign = "+";
                    } else if (data.diff < 0) {
                        diffColorClass = "text-blue-400"; // 빗썸이 비싸면 파란색
                        sign = "-";
                    }

                    const rowHtml = `
                    <div class="grid grid-cols-4 gap-1 px-1 py-4 items-center text-sm text-center hover:bg-gray-750 transition-colors border-b border-gray-700">
                        <div class="font-bold text-gray-100">${data.coin}</div>
                        <div class="text-gray-300">${fmtUpbit}</div>
                        <div class="font-bold ${diffColorClass}">${sign}${fmtDiff}</div>
                        <div class="text-gray-300">${fmtBithumb}</div>
                    </div>`;
                    listContainer.innerHTML += rowHtml;
                });

                const now = new Date();
                const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                document.getElementById('update-time').innerText = `최근 업데이트: ${timeString} (TOP 20)`;

            } catch (error) {
                console.error('데이터 통신 오류:', error);
                document.getElementById('update-time').innerText = "데이터 갱신 지연 중...";
            }
        }

        fetchMarketData();
        setInterval(fetchMarketData, 3000);
    </script>
</body>
</html>
