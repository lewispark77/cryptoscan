<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크립토 스캐너</title>

    <meta property="og:title" content="상한가 헌터 헤리의 크립토 스캐너 ⚡">
    <meta property="og:description" content="업비트 vs 빗썸 실시간 거래량 TOP 20 초고속 차익 분석기">
    <meta property="og:image" content="https://images.unsplash.com/photo-1621416894569-0f39ed31d247?q=80&w=1200&auto=format&fit=crop">
    <meta property="og:url" content="https://lewispark77.github.io/cryptoscan/">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex justify-center min-h-screen font-sans">

    <div class="w-full max-w-md bg-gray-800 shadow-xl flex flex-col min-h-screen">
        
        <header class="bg-gray-950 p-4 text-center border-b border-gray-700 sticky top-0 z-10">
            <h1 class="text-xl font-bold text-blue-400">크립토 스캐너 ⚡</h1>
            <p id="update-time" class="text-xs text-yellow-400 mt-1 font-bold">1/3 데이터 확인 중...</p>
        </header>

        <div class="grid grid-cols-4 gap-1 px-1 py-3 bg-gray-700 text-xs text-gray-300 font-semibold text-center border-b border-gray-600 sticky top-[72px] z-10 shadow-md">
            <div>코인명</div>
            <div>업비트(KRW)</div>
            <div class="text-white font-bold">차액(Gap)</div>
            <div>빗썸(KRW)</div>
        </div>

        <div id="coin-list" class="divide-y divide-gray-700 bg-gray-800 pb-2 flex-grow">
            <div class="p-6 text-center text-sm text-gray-400">
                실시간 거래소 데이터를 연동하고 있습니다...<br>잠시만 기다려주세요.
            </div>
        </div>

        <div class="p-4 bg-gray-900 border-t border-gray-800 sticky bottom-0 z-10">
            <a href="https://blog.naver.com/" target="_blank" class="block w-full text-center bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg text-sm transition-colors shadow-lg">
                상한가 헌터 헤리 블로그 바로가기
            </a>
        </div>

    </div>

    <script>
        const priceData = {};
        let top20Coins = [];
        
        // 플랜 B: API 호출 차단(Rate Limit) 시 가동될 비상용 메이저 20개 코인 리스트
        const fallbackCoins = ['BTC', 'ETH', 'XRP', 'SOL', 'DOGE', 'SHIB', 'ADA', 'TRX', 'BCH', 'ETC', 'SUI', 'APT', 'SEI', 'STX', 'AVAX', 'LINK', 'DOT', 'NEAR', 'SAND', 'MANA'];

        async function initScanner() {
            try {
                // 1. 동적 거래량 리스트 추출 시도
                const upbitRes = await fetch('https://api.upbit.com/v1/market/all');
                if(!upbitRes.ok) throw new Error("업비트 차단됨");
                const upbitMarkets = await upbitRes.json();
                const cachedUpbitCoins = upbitMarkets.filter(m => m.market.startsWith('KRW-')).map(m => m.market.split('-')[1]);

                document.getElementById('update-time').innerText = "2/3 상위 코인 추출 중...";
                const bithumbRes = await fetch('https://api.bithumb.com/public/ticker/ALL_KRW');
                if(!bithumbRes.ok) throw new Error("빗썸 차단됨");
                const bithumbData = await bithumbRes.json();
                
                let activeCoins = [];
                for (const coin in bithumbData.data) {
                    if (coin !== 'date' && cachedUpbitCoins.includes(coin)) {
                        activeCoins.push({
                            coin: coin,
                            volume: parseFloat(bithumbData.data[coin].acc_trade_value_24h)
                        });
                    }
                }
                activeCoins.sort((a, b) => b.volume - a.volume);
                top20Coins = activeCoins.slice(0, 20).map(c => c.coin);

            } catch (error) {
                // 에러 발생 시 플랜 B (비상용 리스트) 가동
                console.warn("API 차단 감지, 비상용 리스트로 우회합니다.", error);
                top20Coins = fallbackCoins;
            }

            // 2. 메모리 객체 세팅
            top20Coins.forEach(coin => {
                priceData[coin] = { upbit: null, bithumb: null };
            });

            document.getElementById('update-time').innerText = "3/3 소켓 스트리밍 준비 중...";

            // 3. 빈 화면 방지용 1회 시세 호출 (이것도 막히면 무시하고 진행)
            try {
                const upbitQuery = top20Coins.map(coin => `KRW-${coin}`).join(',');
                const upbitInitRes = await fetch(`https://api.upbit.com/v1/ticker?markets=${upbitQuery}`);
                if(upbitInitRes.ok) {
                    const upbitInitData = await upbitInitRes.json();
                    upbitInitData.forEach(item => {
                        const c = item.market.split('-')[1];
                        if(priceData[c]) priceData[c].upbit = item.trade_price;
                    });
                }
            } catch(e) {}

            // 화면을 일단 그림
            renderUI();
            document.getElementById('update-time').innerText = "🟢 실시간 스트리밍 가동 중";

            // 4. 웹소켓 연결 (웹소켓은 호출 제한의 영향을 받지 않음)
            connectUpbitSocket();
            connectBithumbSocket();

            // 5. 화면 렌더링 루프
            setInterval(renderUI, 500);
        }

        // --- 업비트 웹소켓 ---
        function connectUpbitSocket() {
            const ws = new WebSocket('wss://api.upbit.com/websocket/v1');
            ws.binaryType = 'blob'; 

            ws.onopen = () => {
                const codes = top20Coins.map(coin => `KRW-${coin}`);
                ws.send(JSON.stringify([
                    { ticket: "premium-scanner" },
                    { type: "ticker", codes: codes }
                ]));
            };

            ws.onmessage = async (event) => {
                try {
                    const text = await event.data.text();
                    const data = JSON.parse(text);
                    if(data.code) {
                        const coin = data.code.split('-')[1];
                        if(priceData[coin]) priceData[coin].upbit = data.trade_price;
                    }
                } catch (e) {}
            };
        }

        // --- 빗썸 웹소켓 ---
        function connectBithumbSocket() {
            const ws = new WebSocket('wss://pubwss.bithumb.com/pub/ws');

            ws.onopen = () => {
                const symbols = top20Coins.map(coin => `${coin}_KRW`);
                ws.send(JSON.stringify({
                    type: "ticker",
                    symbols: symbols,
                    tickTypes: ["MID"] // 체결될 때마다 실시간 수신
                }));
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if(data.type === 'ticker') {
                        const coin = data.content.symbol.split('_')[0];
                        if(priceData[coin]) {
                            priceData[coin].bithumb = parseFloat(data.content.closePrice);
                        }
                    }
                } catch (e) {}
            };
        }

        // --- 화면 그리기 ---
        function renderUI() {
            let analysisResults = [];

            top20Coins.forEach(coin => {
                const uPrice = priceData[coin].upbit;
                const bPrice = priceData[coin].bithumb;
                
                if(uPrice && bPrice) {
                    const diff = uPrice - bPrice; 
                    analysisResults.push({
                        coin: coin,
                        upbit: uPrice,
                        bithumb: bPrice,
                        diff: diff,
                        absGap: Math.abs(diff) 
                    });
                }
            });

            analysisResults.sort((a, b) => b.absGap - a.absGap);

            const listContainer = document.getElementById('coin-list');
            if(analysisResults.length === 0) return; 

            let htmlString = "";
            analysisResults.forEach(data => {
                const fmtUpbit = data.upbit.toLocaleString();
                const fmtBithumb = data.bithumb.toLocaleString();
                const fmtDiff = Math.abs(data.diff).toLocaleString(); 
                
                let diffColorClass = "text-gray-400";
                let sign = "";
                if (data.diff > 0) {
                    diffColorClass = "text-red-400"; 
                    sign = "+";
                } else if (data.diff < 0) {
                    diffColorClass = "text-blue-400"; 
                    sign = "-";
                }

                htmlString += `
                <div class="grid grid-cols-4 gap-1 px-1 py-4 items-center text-sm text-center border-b border-gray-700 transition-all duration-200">
                    <div class="font-bold text-gray-100">${data.coin}</div>
                    <div class="text-gray-300">${fmtUpbit}</div>
                    <div class="font-bold ${diffColorClass}">${sign}${fmtDiff}</div>
                    <div class="text-gray-300">${fmtBithumb}</div>
                </div>`;
            });

            listContainer.innerHTML = htmlString;
        }

        initScanner();
    </script>
</body>
</html>
