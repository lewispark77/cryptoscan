<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크립토 스캐너</title>

    <meta property="og:title" content="상한가 헌터 헤리의 크립토 스캐너 ⚡">
    <meta property="og:description" content="업비트 vs 빗썸 실시간 거래량 TOP 20 초고속 차익 분석기">
    <meta property="og:image" content="https://images.unsplash.com/photo-1621416894569-0f39ed31d247?q=80&w=1200&auto=format&fit=crop">
    <meta property="og:url" content="https://lewispark77.github.io/cryptoscan/">
    <meta property="og:type" content="website">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex justify-center min-h-screen font-sans">

    <div class="w-full max-w-md bg-gray-800 shadow-xl flex flex-col min-h-screen relative">
        
        <header class="bg-gray-950 p-3 text-center border-b border-gray-700 sticky top-0 z-10">
            <h1 class="text-lg font-bold text-blue-400">크립토 스캐너 ⚡</h1>
            <p id="update-time" class="text-xs text-yellow-400 mt-1 font-bold">네트워크 연결 중...</p>
        </header>

        <div class="grid grid-cols-[1.5fr,1.5fr,2.2fr,1.5fr] gap-1 px-1 py-3 bg-gray-700 text-xs text-gray-300 font-semibold text-center border-b border-gray-600 sticky top-[64px] z-10 shadow-md">
            <div>코인명 <span class="text-[10px] font-normal text-gray-400">(망)</span></div>
            <div>업비트(KRW)</div>
            <div class="text-white font-bold">차액(Gap) / <span class="text-yellow-300">1천만 마진</span></div>
            <div>빗썸(KRW)</div>
        </div>

        <div id="coin-list" class="divide-y divide-gray-700 bg-gray-800 pb-2 flex-grow overflow-y-auto">
            </div>

        <div class="p-3 bg-gray-900 border-t border-gray-800 sticky bottom-0 z-10">
            <a href="https://blog.naver.com/lewispark77" target="_blank" class="block w-full text-center bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg text-sm transition-colors shadow-lg">
                상한가 헌터 헤리 블로그 바로가기
            </a>
        </div>

    </div>

    <script>
        const priceData = {};
        let top20Coins = [];
        
        const fallbackCoins = ['BTC', 'ETH', 'XRP', 'SOL', 'DOGE', 'SHIB', 'ADA', 'TRX', 'BCH', 'ETC', 'SUI', 'APT', 'SEI', 'STX', 'AVAX', 'LINK', 'DOT', 'NEAR', 'SAND', 'MANA'];

        const networkTags = {
            'XRP': '리플 (초고속/저렴)',
            'TRX': '트론 (초고속/저렴)',
            'SOL': '솔라나 (초고속)',
            'DOGE': '도지 (보통)',
            'ADA': '에이다 (보통)',
            'BTC': '비트코인 (느림/비쌈)',
            'ETH': 'ERC-20 (느림/비쌈)',
            'BCH': '비트캐시 (보통)',
            'ETC': '이더클래식 (느림)',
            'SHIB': 'ERC-20 (느림)',
            'SAND': 'ERC-20 (느림)',
            'LINK': 'ERC-20 (느림)',
            'MANA': 'ERC-20 (느림)',
            'SUI': '수이 (빠름)',
            'APT': '앱토스 (빠름)',
            'SEI': '세이 (빠름)'
        };

        const tradeVolume = 10000000;
        const totalFeeRate = 0.0010; 

        async function initScanner() {
            top20Coins = fallbackCoins;
            top20Coins.forEach(coin => {
                priceData[coin] = { upbit: null, bithumb: null };
            });
            renderUI(); 

            try {
                const bithumbRes = await fetch('https://api.bithumb.com/public/ticker/ALL_KRW');
                if(bithumbRes.ok) {
                    const bithumbData = await bithumbRes.json();
                    
                    let activeCoins = [];
                    for (const coin in bithumbData.data) {
                        if (coin !== 'date' && fallbackCoins.includes(coin)) {
                            activeCoins.push({
                                coin: coin,
                                volume: parseFloat(bithumbData.data[coin].acc_trade_value_24h),
                                initPrice: parseFloat(bithumbData.data[coin].closing_price)
                            });
                        }
                    }
                    activeCoins.sort((a, b) => b.volume - a.volume);
                    
                    top20Coins = activeCoins.map(c => c.coin);
                    top20Coins.forEach(coin => {
                        priceData[coin] = { upbit: null, bithumb: activeCoins.find(c => c.coin === coin)?.initPrice || null };
                    });
                }

                const upbitQuery = top20Coins.map(coin => `KRW-${coin}`).join(',');
                const upbitInitRes = await fetch(`https://api.upbit.com/v1/ticker?markets=${upbitQuery}`);
                if(upbitInitRes.ok) {
                    const upbitInitData = await upbitInitRes.json();
                    upbitInitData.forEach(item => {
                        const c = item.market.split('-')[1];
                        if(priceData[c]) priceData[c].upbit = item.trade_price;
                    });
                }
            } catch (error) {
                console.warn("API 차단 상태. 소켓 전용 모드로 작동합니다.");
            }

            renderUI();
            document.getElementById('update-time').innerText = "🟢 실시간 스트리밍 가동 중";

            connectUpbitSocket();
            connectBithumbSocket();

            setInterval(renderUI, 500);
        }

        function connectUpbitSocket() {
            const ws = new WebSocket('wss://api.upbit.com/websocket/v1');
            ws.binaryType = 'blob'; 

            ws.onopen = () => {
                const codes = top20Coins.map(coin => `KRW-${coin}`);
                ws.send(JSON.stringify([
                    { ticket: "crypto-scanner" },
                    { type: "ticker", codes: codes }
                ]));
            };

            ws.onmessage = (event) => {
                const reader = new FileReader();
                reader.onload = function() {
                    try {
                        const data = JSON.parse(reader.result);
                        if(data.code) {
                            const coin = data.code.split('-')[1];
                            if(priceData[coin] !== undefined) {
                                priceData[coin].upbit = data.trade_price;
                            }
                        }
                    } catch (e) {}
                };
                reader.readAsText(event.data);
            };
        }

        function connectBithumbSocket() {
            const ws = new WebSocket('wss://pubwss.bithumb.com/pub/ws');

            ws.onopen = () => {
                const symbols = top20Coins.map(coin => `${coin}_KRW`);
                ws.send(JSON.stringify({
                    type: "ticker",
                    symbols: symbols,
                    tickTypes: ["MID"] 
                }));
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if(data.type === 'ticker') {
                        const coin = data.content.symbol.split('_')[0];
                        if(priceData[coin] !== undefined) {
                            priceData[coin].bithumb = parseFloat(data.content.closePrice);
                        }
                    }
                } catch (e) {}
            };
        }

        function renderUI() {
            let analysisResults = [];

            top20Coins.forEach(coin => {
                const uPrice = priceData[coin].upbit;
                const bPrice = priceData[coin].bithumb;
                
                let diff = null;
                let absGap = -1;
                let marginKRW = 0;

                if(uPrice && bPrice) {
                    diff = uPrice - bPrice; 
                    absGap = Math.abs(diff);

                    const minPrice = Math.min(uPrice, bPrice);
                    const gapRate = absGap / minPrice;
                    const realMarginRate = gapRate - totalFeeRate; 
                    marginKRW = Math.floor(tradeVolume * realMarginRate); 
                }

                analysisResults.push({
                    coin: coin,
                    upbit: uPrice,
                    bithumb: bPrice,
                    diff: diff,
                    absGap: absGap,
                    marginKRW: marginKRW
                });
            });

            analysisResults.sort((a, b) => b.absGap - a.absGap);

            let htmlString = "";
            analysisResults.forEach(data => {
                const fmtUpbit = data.upbit ? data.upbit.toLocaleString() : '<span class="text-gray-500 text-xs">수신중</span>';
                const fmtBithumb = data.bithumb ? data.bithumb.toLocaleString() : '<span class="text-gray-500 text-xs">수신중</span>';
                
                let diffColorClass = "text-gray-600";
                let sign = "";
                let gapDisplay = '<span class="text-gray-500 text-xs">대기</span>';

                if (data.diff !== null) {
                    const fmtGap = Math.abs(data.diff).toLocaleString();
                    
                    // 1. 방향에 따른 기호 및 색상 분리 (업비트 기준)
                    if (data.diff > 0) {
                        diffColorClass = "text-red-400"; // 업비트가 비싸면 빨강
                        sign = "+";
                    } else if (data.diff < 0) {
                        diffColorClass = "text-blue-400"; // 빗썸이 비싸면 파랑
                        sign = "-";
                    } else {
                        diffColorClass = "text-gray-300"; // 똑같으면 회색
                    }

                    // 2. 마진 표시 (수수료를 제한 진짜 수익이 0보다 클 때만 표시)
                    let marginDisplay = "";
                    if (data.marginKRW > 0) {
                        marginDisplay = `<br><span class="text-yellow-300 font-bold text-xs">(+${data.marginKRW.toLocaleString()})</span>`;
                    } else {
                        marginDisplay = `<br><span class="text-gray-500 font-normal text-[10px]">(수수료 미달)</span>`;
                    }
                    
                    gapDisplay = `${sign}${fmtGap}${marginDisplay}`;
                }

                const tagInfo = networkTags[data.coin] || '망 확인필요';

                htmlString += `
                <div class="grid grid-cols-[1.5fr,1.5fr,2.2fr,1.5fr] gap-1 px-1 py-4 items-center text-sm text-center border-b border-gray-700 transition-all duration-200">
                    <div class="font-bold text-gray-100 flex flex-col items-center justify-center">
                        <span>${data.coin}</span>
                        <span class="text-[10px] text-gray-400 font-normal mt-0.5">(${tagInfo})</span>
                    </div>
                    <div class="text-gray-300">${fmtUpbit}</div>
                    <div class="font-bold ${diffColorClass}">${gapDisplay}</div>
                    <div class="text-gray-300">${fmtBithumb}</div>
                </div>`;
            });

            document.getElementById('coin-list').innerHTML = htmlString;
        }

        initScanner();
    </script>
</body>
</html>
